<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>You're offline — DocTalk</title>
<link rel="icon" href="/favicon.ico" />
<style>
  :root { color-scheme: light dark; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    padding: 1.5rem;
    text-align: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #ffffff;
    color: #0b0b14;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #0b0b14; color: #f5f5f7; }
    .card { background: #16162a; border-color: #2a2a45; }
    .button { background: #6366f1; }
  }
  .mark {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    background: #4f46e5;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .mark span {
    display: block;
    width: 5px;
    border-radius: 3px;
    background: #ffffff;
  }
  .mark span:nth-child(1) { height: 12px; }
  .mark span:nth-child(2) { height: 28px; }
  .mark span:nth-child(3) { height: 36px; }
  .mark span:nth-child(4) { height: 20px; }
  h1 { font-size: 1.5rem; margin: 0.5rem 0 0; }
  p { max-width: 28rem; margin: 0; color: #6b7280; }
  .button {
    margin-top: 0.5rem;
    padding: 0.75rem 1.5rem;
    border-radius: 999px;
    border: none;
    background: #4f46e5;
    color: #ffffff;
    font-weight: 600;
    font-size: 0.875rem;
    cursor: pointer;
  }
</style>
</head>
<body>
  <div class="mark" aria-hidden="true">
    <span></span><span></span><span></span><span></span>
  </div>
  <h1>You&apos;re offline</h1>
  <p>DocTalk needs a connection to reach your documents and the voice assistant. Check your connection and try again.</p>
  <button class="button" onclick="location.reload()" type="button">Try again</button>
</body>
</html>
